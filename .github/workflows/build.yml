name: build

# Se lance a la main (onglet Actions -> Run workflow) ou a chaque push.
on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install

      - name: Build app
        run: npm run dist
        env:
          # build non signe (pas de certificat) -> normal pour un projet perso
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: KonohaVivant-${{ matrix.os }}
          if-no-files-found: warn
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
